version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/calyte}
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - calyte-network

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: calyte
    volumes:
      - mongo-data:/data/db
    networks:
      - calyte-network

volumes:
  mongo-data:

networks:
  calyte-network:
    driver: bridge
