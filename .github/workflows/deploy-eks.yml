name: Deploy to EKS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name calyte-cluster --region us-east-1

    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f kubernetes/

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/calyte-app -n default --timeout=5m

    - name: Verify deployment
      run: |
        kubectl get pods -n default -l app=calyte
        kubectl get service calyte-service -n default
