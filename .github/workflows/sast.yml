name: AccuKnox Opengrep SAST

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  accuknox-cicd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug repo metadata
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_SERVER_URL=${GITHUB_SERVER_URL}"
          git rev-parse --is-inside-work-tree || true
          git remote -v || true
          echo "origin.url=$(git config --get remote.origin.url || echo '<empty>')"

      - name: "Run AccuKnox SAST: Opengrep"
        uses: ./.github
        with:
          skip_sonar_scan: false
          sonar_project_key: "VanishaParwal_CalyteInfra"
          sonar_org_id: "vanishaparwal123"
          sonar_token: "0f45159c6e9af5a4e2c6748c481ec1ff21aee639"
          sonar_host_url: "https://sonarcloud.io"
          accuknox_endpoint: "cspm.stage.accuknox.com"
          accuknox_label: "sonartest"
          accuknox_token: ${{ secrets.ACCUKNOX_TOKEN }}
          soft_fail: false
